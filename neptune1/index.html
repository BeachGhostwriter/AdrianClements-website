<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neptune 1 Application</title>
    <style>
      body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background: #f7fbf8; color: #223127; }
      .wrap { max-width: 720px; margin: 80px auto; padding: 32px; background: white; border-radius: 16px; box-shadow: 0 14px 30px rgba(0,0,0,0.08); }
      input { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #cfe4d2; border-radius: 8px; }
      button { margin-top: 16px; padding: 10px 16px; border: none; border-radius: 8px; background: #2f6b3d; color: white; cursor: pointer; }
      .hint { color: #5d6d5f; font-size: 0.95rem; margin-top: 10px; }
      .error { color: #b13b3b; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Neptune 1 Application</h1>
      <p>This area is password protected.</p>
      <input id="password" type="password" placeholder="Enter password" />
      <button onclick="checkPassword()">Access</button>
      <div class="hint">Hint: use your approved access code.</div>
      <div id="error" class="error"></div>
    </div>
    <script>
      function checkPassword() {
        const pass = document.getElementById('password').value;
        if (pass === 'Neptune2026') {
          document.getElementById('error').textContent = '';
          window.location.href = 'https://example.com/neptune';
        } else {
          document.getElementById('error').textContent = 'Incorrect password.';
        }
      }
    </script>
  </body>
</html>
